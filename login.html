<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>登录</title>
    <style>
        *{
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            height: 500px;
            display: flex;
            justify-content: center;
            align-items: center;
            background: #f5f5f5;
        }
        .login-box{
            width: 350px;
            padding: 40px;
            background: white;
            border-radius: 8px;
            box-shadow: 0 0 1 #888888;
        }
        .login-title{
            justify-content: center;
            align-items: center;
        }
    </style>
</head>
<body>
    <form>
        <div class="login-box">
            <h1 class="login-title">登录</h1><br>
            <span>账号：</span>
            <input type="text" placeholder="请输入账号"><br><br>
            <span>密码：</span>
            <input type="password" placeholder="请输入密码"><br><br>
            <button>登录</button>
        </div>
    </form>
    <form action="#"></form>
</body>
</html>
