<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>登录</title>
    <style>
        *{
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            height: 80vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: url(blackboom.jpg);
            background-size: 2000px 1000px;
            background-repeat: no-repeat;
            background-origin:content-box;
        }
        .login-box{
            width: 380px;
            height: 450px;
            padding: 50px;
            border-radius: 8px;
            background-color: white;
            box-shadow: 0 0 10px rgb(0, 0, 1);
            display: flex;
            flex-direction: column;
        }
        .login-title{
            display: flex;
            justify-content: center;
            align-items: flex-start;
        }
        input{
            height: 40px;
            padding: 0 10px;
            border: 1px solid #ddd;
            border-radius: 4px;
        }
        button{
            height: 50px;
            width: 280px;
            background: #409eff;
            color: white;
            border: none;
            border-radius: 4px;
            font-weight: bold;
            font-size: 20px;
            -webkit-transition-duration: 0.4s; /* Safari */
            transition-duration: 0.4s;
        }
        .button1 {
            background-color: white;
            color: black;
            border: 2px solid #409eff;
        }
        .button1:hover {
            background-color: #409eff;
            color: white;
        }
    </style>
</head>
<body>
    <form>
        <div class="login-box">
            <h1 class="login-title">登录</h1><br>
            <span>账号：</span>
            <input type="text" placeholder="请输入账号"><br><br>
            <span>密码：</span>
            <input type="password" placeholder="请输入密码"><br><br>
            <button class="button1">登录</button>
        </div>
    </form>
    <form action="#"></form>
</body>
</html>
